indexpage:
  title: Documentação do AI Data Engine
  summary: A documentação do AI Data Engine fornece informações abrangentes sobre
    a instalação, configuração e gerenciamento de sistemas AIDE, incluindo catalogação
    de metadados, gerenciamento de espaço de trabalho, coleções de dados e integração
    com fluxos de trabalho de IA/ML.
  keywords: aide, ai data engine, ontap, metadata engine, workspaces, data collections,
    vector database, guardrails, dcn, data compute nodes
  lead: NetApp AI Data Engine (AIDE) é uma plataforma de nível empresarial projetada
    para acelerar e simplificar o processamento de dados orientados por IA, gerenciamento
    e governança. AIDE transforma dados não estruturados em conjuntos de dados estruturados
    e prontos para IA, para cargas de trabalho de aprendizado de máquina e IA generativa.
